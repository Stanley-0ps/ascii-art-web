<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stanley's ASCII Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <link rel="icon" href="https://i.ibb.co/zFfCjxH/Pngtree-phoenix-png-6854120.png" type="image/x-icon">
</head>

<body>
<div class="app-shell">
    <aside class="input">
        <div class="topbar">
            <a class="brand-mark" href="https://github.com/Stanley-0ps/ascii-art-web" target="_blank" rel="noreferrer">S0</a>
            <input id="dark-mode" class="dark-mode-checkbox hidden" type="checkbox">
            <label for="dark-mode" class="toggle-switch" title="Toggle theme">
                <span class="toggle-icon sun-icon">L</span>
                <span class="toggle-icon moon-icon">D</span>
            </label>
        </div>

        <p class="eyebrow">Stanley-0ps presents</p>
        <h1>ASCII Studio</h1>
        <p class="intro">Shape plain text into loud terminal art, preview every banner style, and export the result when it hits right.</p>

        <form action="/ascii-art" method="post">
            <div class="field-row">
                <label for="banner">Banner style</label>
                <select id="banner" name="banner">
                    {{range .Fonts}}
                    <option class="bannerOption" value="{{.}}" {{if eq $.Banner .}}selected{{end}}>{{.}}</option>
                    {{end}}
                </select>
            </div>

            <label class="text-label" for="text">Message</label>
            <textarea id="text" name="text" maxlength="6000" placeholder="Type something worth rendering..." tabindex="3" required>{{.Text}}</textarea>

            <div class="btns">
                <button class="submit primary" name="action" value="generate" type="submit">Generate</button>
                <button class="submit" name="action" value="preview" type="submit">Preview</button>
                <button class="submit" name="action" value="download" type="submit">Download</button>
            </div>
        </form>

        <div class="signature">
            <span>Built by <a href="https://github.com/Stanley-0ps" target="_blank" rel="noreferrer">Stanley-0ps</a></span>
            <a href="https://github.com/Stanley-0ps/ascii-art-web" target="_blank" rel="noreferrer">GitHub repo</a>
        </div>
    </aside>

    <main class="art">
        <div class="result-header">
            <div>
                <p class="eyebrow">Live output</p>
                <h2>ASCII Art Result</h2>
            </div>
            <div class="copy-area">
                <button class="copy-btn" onclick="copyToClipboard()" aria-label="Copy ASCII art">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <span class="copied-msg" id="copiedMsg">Copied</span>
            </div>
        </div>
        <pre class="ascii">{{.Art}}</pre>
    </main>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const darkMode = document.getElementById('dark-mode');

        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            darkMode.checked = true;
        }

        darkMode.addEventListener('change', function () {
            if (this.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'enabled');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('darkMode', 'disabled');
            }
        });
    });

    function copyToClipboard() {
        const asciiArt = document.querySelector('.ascii').innerText;
        navigator.clipboard.writeText(asciiArt).then(() => {
            const copiedMsg = document.getElementById('copiedMsg');
            copiedMsg.style.opacity = 1;
            setTimeout(() => {
                copiedMsg.style.opacity = 0;
            }, 1000);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    }
</script>

</body>

</html>

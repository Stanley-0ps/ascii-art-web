<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stanley's ASCII Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<div class="preview-shell">
    <header>
        <a href="/" class="back-link">Back to studio</a>
        <p>Stanley-0ps banner preview</p>
        <h1>Choose the voice your text deserves.</h1>
    </header>

    <div class="preview-grid">
    {{ range $key, $value := .}}
        <section class="preview-card">
            <div class="fontName">{{$key}}</div>
            <pre>{{$value}}</pre>
        </section>
    {{end}}
    </div>
</div>
</body>

</html>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap');

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: #111318;
        color: #f5efe3;
        font-family: "Josefin Sans", Arial, sans-serif;
    }

    .preview-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0 56px;
    }

    header {
        margin-bottom: 28px;
    }

    header p {
        color: #74d3c8;
        font-family: "Inconsolata", monospace;
        font-size: 0.95rem;
        letter-spacing: 0;
        margin: 22px 0 8px;
        text-transform: uppercase;
    }

    h1 {
        color: #fff8eb;
        font-family: "Inconsolata", monospace;
        font-size: clamp(2rem, 5vw, 4.5rem);
        line-height: 0.95;
        margin: 0;
        max-width: 760px;
    }

    .back-link {
        color: #111318;
        background: #ffcf5a;
        border: 1px solid #ffdf88;
        border-radius: 6px;
        display: inline-flex;
        font-weight: 700;
        padding: 10px 14px;
        text-decoration: none;
    }

    .preview-grid {
        display: grid;
        gap: 18px;
    }

    .preview-card {
        background: #181b22;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.22);
        overflow: hidden;
    }

    .fontName{
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffcf5a;
        font-family: "Inconsolata", "Open Sans", sans-serif;
        font-size: 1.05rem;
        font-weight: 800;
        padding: 14px 16px;
        text-transform: uppercase;
    }

    pre {
        color: #e8fff8;
        font-family: "Inconsolata", monospace;
        font-size: 0.88rem;
        line-height: 1.1;
        margin: 0;
        overflow: auto;
        padding: 18px;
    }

    @media (max-width: 620px) {
        .preview-shell {
            width: min(100% - 20px, 1180px);
            padding-top: 24px;
        }

        pre {
            font-size: 0.72rem;
        }
    }
</style>
